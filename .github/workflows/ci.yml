name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: framefeed:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker run --rm --entrypoint python framefeed:ci -c "import cv2, framefeed; print(framefeed.__version__, cv2.__version__)"
