name: Bug report
description: Report a reproducible FrameFeed problem without private data
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach family photos, album URLs, frame secrets, domains, or IP addresses.
  - type: input
    id: version
    attributes:
      label: FrameFeed version
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Unraid, Linux with Docker, Other]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
